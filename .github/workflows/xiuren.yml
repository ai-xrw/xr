name: xchina每日一页

on:
  schedule:
    - cron: '0 16 * * *'   # UTC 16:00 = 北京时间 00:00
  workflow_dispatch:

concurrency:
  group: xchina-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: 安装依赖
        run: pip install requests beautifulsoup4 urllib3

      - name: 运行抓取脚本
        env:
          TG_TOKEN:   ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_GROUP_ID: ${{ secrets.TG_GROUP_ID }}
          CF_COOKIE:  ${{ secrets.CF_COOKIE }}
          VIP_LINK:   ${{ secrets.VIP_LINK }}
        run: python update_xchina.py

      - name: 提交进度文件
        if: always()
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add next_page.txt seen_xchina.json || true
          git diff --cached --quiet || git commit -m "Update progress [skip ci]"
          git pull --rebase origin main
          git push
