name: 秀人机构搬运

on:
  schedule:
    - cron: '0 */24 * * *'    # 每6小时
  workflow_dispatch:

concurrency:
  group: xiuren-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium --with-deps

      - name: 恢复进度缓存
        id: cache-seen
        uses: actions/cache@v4
        with:
          path: seen_xiuren.json
          key: xiuren-seen-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            xiuren-seen-${{ runner.os }}-

      - name: 初始化进度文件（若无缓存）
        if: steps.cache-seen.outputs.cache-hit != 'true'
        run: echo '[]' > seen_xiuren.json

      - name: 运行抓取脚本
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_GROUP_ID: ${{ secrets.TG_GROUP_ID }}
        run: python update_xiuren.py

      - name: 保存进度缓存
        if: success()
        uses: actions/cache@v4
        with:
          path: seen_xiuren.json
          key: xiuren-seen-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            xiuren-seen-${{ runner.os }}-
